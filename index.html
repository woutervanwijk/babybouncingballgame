<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Baby Ball Game">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4a90e2">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="icon" type="image/png" href="icon-192x192.png">
    <title>Baby Ball Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container"></div>
    <!-- New counter table will be added via JavaScript -->
    <div id="counter-table"></div>
    <button id="mute-button" class="side-button" title="Mute/Unmute" tabindex="-1"></button>
    <button id="reset-button" class="side-button" title="Reset Game" tabindex="-1">
        <img src="svg/reset.svg" alt="Reset Game" style="width: 24px; height: 24px; filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.3));">
    </button>
    <!-- Load Phaser from local directory -->
    <script src="phaser/phaser.min.js"></script>
    <script src="game.js"></script>
    <script>
      // Register service worker for PWA support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js')
            .then(registration => {
              console.log('ServiceWorker registration successful');
              
              // Check for updates on load
              registration.update();
              
              // If a new service worker is waiting, it will take over due to skipWaiting()
              registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('New content available, please refresh.');
                    }
                  };
                }
              };
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });

        // Also check for updates when the page is focused or comes back from background
        window.addEventListener('focus', () => {
          navigator.serviceWorker.getRegistration().then(registration => {
            if (registration) registration.update();
          });
        });
      }
    </script>
</body>
</html>
